substitutions:
  project_version: "dev"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  min_version: 2026.2.1
  project:
    name: "a10kiloham.Transit Tracker"
    version: ${project_version}

ota:
  - platform: http_request
  - platform: esphome

external_components:
  - source: github://avwuff/ESPHome-HUB75-MatrixDisplayWrapper@4fc1f26500b97a39693cd8af4ba2abb75f83ce0b
    refresh: 0s
  - source: github://a10kiloham/esphome-transit-tracker@main
    refresh: 0s
  - source: github://tjhorner/esphome-custom-components@c57ffd46fcf30badb2838421e8ff6cbeb9c1dd06
    components: [ lis3dh, project_version ]
    refresh: 0s

dashboard_import:
  package_import_url: github://a10kiloham/transit-tracker/firmware/transit-tracker.yaml@main

esp32:
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: arduino

psram:
  mode: quad
  speed: 80MHz

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: "NONE"
  ap:
    password: "transittracker"

api:
  reboot_timeout: 0s

http_request:
  verify_ssl: false

switch:
  - platform: template
    id: flip_display_config
    name: "Flip Display"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(matrix).set_rotation(esphome::display::DisplayRotation::DISPLAY_ROTATION_180_DEGREES);
    turn_off_action:
      - lambda: |-
          id(matrix).set_rotation(esphome::display::DisplayRotation::DISPLAY_ROTATION_0_DEGREES);
  - platform: template
    id: scroll_headsigns_config
    name: "Scroll Headsigns"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: id(tracker).set_scroll_headsigns(true);
    turn_off_action:
      - lambda: id(tracker).set_scroll_headsigns(false);
  - platform: template
    id: show_line_icons_config
    name: "Show Line Icons"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: id(tracker).set_show_line_icons(true);
    turn_off_action:
      - lambda: id(tracker).set_show_line_icons(false);

button:
  - platform: restart
    name: "Restart"
  - platform: template
    id: reload_tracker
    name: "Reload Tracker"
    on_press:
      - lambda: |-
          id(tracker).reconnect();
  - platform: template
    id: write_preferences
    on_press:
      - lambda: |-
          global_preferences->sync();

text:
  - &config_text_common
    platform: template
    id: base_url_config
    mode: text
    optimistic: true
    restore_value: true
    on_value:
      then:
        lambda: |
          id(tracker).set_base_url(id(base_url_config)->state);
  - <<: *config_text_common
    id: feed_code_config
    on_value:
      then:
        lambda: |
          id(tracker).set_feed_code(id(feed_code_config)->state);
  - <<: *config_text_common
    id: schedule_config
    on_value:
      then:
        lambda: |
          id(tracker).set_schedule_string(id(schedule_config)->state);
  - <<: *config_text_common
    id: abbreviations_config
    on_value:
      then:
        lambda: |
          id(tracker).set_abbreviations_from_text(id(abbreviations_config)->state);
  - <<: *config_text_common
    id: route_styles_config
    on_value:
      then:
        lambda: |
          id(tracker).set_route_styles_from_text(id(route_styles_config)->state);
  - <<: *config_text_common
    id: sort_order_config
    on_value:
      then:
        lambda: |
          id(tracker).set_sort_order_from_text(id(sort_order_config)->state);  
  - <<: *config_text_common
    id: now_str_config
    initial_value: "min"
    on_value:
      then:
        lambda: |-
          id(tracker).get_localization()->set_now_string(id(now_str_config)->state);
  - <<: *config_text_common
    id: min_long_str_config
    initial_value: "min"
    on_value:
      then:
        lambda: |-
          id(tracker).get_localization()->set_minutes_long_string(id(min_long_str_config)->state);
  - <<: *config_text_common
    id: min_short_str_config
    initial_value: "m"
    on_value:
      then:
        lambda: |-
          id(tracker).get_localization()->set_minutes_short_string(id(min_short_str_config)->state);
  - <<: *config_text_common
    id: hours_short_str_config
    initial_value: "h"
    on_value:
      then:
        lambda: |-
          id(tracker).get_localization()->set_hours_short_string(id(hours_short_str_config)->state);

select:
  - platform: template
    id: time_display_config
    optimistic: true
    restore_value: true
    options:
      - "departure"
      - "arrival"
    on_value:
      then:
        lambda: |-
          id(tracker).set_display_departure_times(id(time_display_config)->current_option() == "departure");
  - platform: template
    id: time_units_config
    optimistic: true
    restore_value: true
    options:
      - "long"
      - "short"
      - "none"
    on_value:
      then:
        lambda: |-
          transit_tracker::UnitDisplay unit_display;
          if (id(time_units_config)->current_option() == "long") {
            unit_display = transit_tracker::UnitDisplay::UNIT_DISPLAY_LONG;
          } else if (id(time_units_config)->current_option() == "short") {
            unit_display = transit_tracker::UnitDisplay::UNIT_DISPLAY_SHORT;
          } else {
            unit_display = transit_tracker::UnitDisplay::UNIT_DISPLAY_NONE;
          }

          id(tracker).set_unit_display(unit_display);
  - platform: template
    id: list_mode_config
    optimistic: true
    restore_value: true
    options:
      - "sequential"
      - "nextPerRoute"
    on_value:
      then:
        lambda: |-
          id(tracker).set_list_mode(id(list_mode_config)->current_option());

output:
  - platform: template
    id: display_brightness_output
    type: float
    min_power: 0.004 # 1/255
    zero_means_zero: true
    write_action:
      - hub75.set_brightness:
          id: matrix
          brightness: !lambda return state * 255.0;

light:
  - platform: monochromatic
    name: Display Brightness
    id: display_brightness
    output: display_brightness_output
    restore_mode: RESTORE_DEFAULT_ON

web_server:
  js_include: "./transit_config_ui.js"

status_led:
  pin:
    number: GPIO13

script:
  - id: dim_display
    parameters:
      up: bool
    then:
      - light.dim_relative:
          id: display_brightness
          relative_brightness: !lambda "return up ? 0.2 : -0.2;"
          transition_length: 0.1s

binary_sensor:
  - platform: template
    id: both_buttons
    lambda: |-
      return id(up_button).state && id(down_button).state;
    on_press:
      then:
        - display.page.show_next: matrix
  - platform: gpio
    id: up_button
    pin: &button_pin_cfg
      number: GPIO6
      inverted: true
      mode:
        input: true
        pullup: true
    filters: &button_filters
      - autorepeat:
        - delay: 500ms
          time_off: 300ms
          time_on: 100ms
    on_press:
      then:
        - script.execute:
            id: dim_display
            up: !lambda "return !id(flip_display_config).state;"
  - platform: gpio
    id: down_button
    pin:
      <<: *button_pin_cfg
      number: GPIO7
    filters: *button_filters
    on_press:
      then:
        - script.execute:
            id: dim_display
            up: !lambda "return id(flip_display_config).state;"

i2c:
  sda: GPIO16
  scl: GPIO17

lis3dh:
  range: 2G
  data_rate: 1HZ
  resolution: HIGH_RES
  address: 0x19
  update_interval: 1s

debug:

text_sensor:
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"
  - platform: project_version
    id: project_version_text
  - platform: lis3dh
    orientation_xy:
      id: orientation_sensor
      on_value:
        then:
          - if:
              condition:
                lambda: |-
                  return x == "Portrait Upside Down";
              then:
                - switch.turn_on: flip_display_config
          - if:
              condition:
                lambda: |-
                  return x == "Portrait Upright";
              then:
                - switch.turn_off: flip_display_config

sensor:
  - platform: uptime
    type: timestamp
    name: Uptime
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s
    entity_category: "diagnostic"

display:
  - platform: hub75
    id: matrix
    board: adafruit-matrix-portal-s3
    double_buffer: true
    update_interval: 32ms
    panel_width: 64
    panel_height: 32
    layout_cols: 2
    # We swap the G and B channels in firmware because the 64x32 panel hardware has them reversed
    g1_pin: 40
    b1_pin: 41
    g2_pin: 37
    b2_pin: 39
    e_pin: 21
    brightness: 255
    pages:
      - id: transit_schedule
        lambda: |-
          id(tracker).draw_schedule();
      - id: clock_page
        lambda: |-
          int x = it.get_width() / 2;
          int y = it.get_height() / 2;
          it.strftime(x, y / 2, id(pixolletta), COLOR_ON, TextAlign::CENTER, "%r", id(sntp_time).now());
          it.strftime(x, y + (y / 2), id(pixolletta), COLOR_ON, TextAlign::CENTER, "%B %d, %Y", id(sntp_time).now());
font:
  - file: "fonts/Pixolletta8px.ttf"
    id: pixolletta
    size: 10
    glyphs:
      - abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,:;!?()"'-+/*=%@#[]{}<>|&^~
      - ÄËÏÖÜÉÈÔäëïöüéèôŊŋÁÊÎÛÝáêîûýĜĝÀÌÒàìòÑñÍÓÚíóúÇçĆČĐŠŽćčđšžÙùÕõŞŁŇŘşłňřÅåØøĀĒĪŌŪāēīōūÂâĞğıĎĚŤŮďěťůÆæĲĳŒœÐðŸÿßŐŰőűÞþÃãĂĔĬŎŬăĕĭŏŭĨŨĩũĄĘŃŚŻąęńśżĖėĢĶĻŅģķļņĮŲįųŔŹŕźĊĠċġħŜŝŢţŦŧŴŵŶŷĹĽĺľİ
      - " "

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/London

color:
  - id: "c_001AFF"
    hex: "001AFF"
  - id: "c_FF0037"
    hex: "FF0037"
  - id: my_red
    hex: "F50046"
  - id: my_green
    hex: "20FF00"
  - id: my_orange
    hex: "ff5900"
  - id: numbered_yellow
    hex: "FFD700"
  - id: headsign_white
    hex: "E0E0E0"
  - id: time_grey
    hex: "B0B0B0"
  - id: realtime_green
    hex: "20FF00"

